<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>SoloQ Roulette · Wheel v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Champion splash + tile images (referenced in JS, lifted for the bundler) -->
    <meta name="ext-resource-dependency" content="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Teemo_0.jpg"  data-resource-id="champ_teemo" />
    <meta name="ext-resource-dependency" content="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Soraka_0.jpg" data-resource-id="champ_soraka" />
    <meta name="ext-resource-dependency" content="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Kayn_0.jpg"   data-resource-id="champ_kayn" />
    <meta name="ext-resource-dependency" content="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Yuumi_0.jpg"  data-resource-id="champ_yuumi" />
    <meta name="ext-resource-dependency" content="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Jinx_0.jpg"   data-resource-id="champ_jinx" />
    <meta name="ext-resource-dependency" content="https://ddragon.leagueoflegends.com/cdn/img/champion/tiles/Garen_0.jpg"    data-resource-id="tile_garen" />
    <meta name="ext-resource-dependency" content="https://ddragon.leagueoflegends.com/cdn/img/champion/tiles/Yuumi_0.jpg"    data-resource-id="tile_yuumi" />
    <meta name="ext-resource-dependency" content="https://ddragon.leagueoflegends.com/cdn/img/champion/tiles/Thresh_0.jpg"   data-resource-id="tile_thresh" />
    <style>
      html, body {
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 0;
        overflow: hidden;
        color: #fff;
        font-family: 'Outfit', system-ui, sans-serif;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Plus Jakarta Sans', 'General Sans', system-ui, sans-serif;
        font-weight: 700;
        margin: 0;
      }
      #root { width: 100%; height: 100%; display: block; }
      *::-webkit-scrollbar { display: none; }
      select option { background: #161618; color: #fff; }

      /* Default body background — simulated Summoner's Rift gradient.
         Toggled via .bg-on / .bg-off classes from the app. */
      body {
        background-color: #0a1810;
        background-image:
          radial-gradient(ellipse at 30% 35%, rgba(40, 80, 60, 0.55) 0%, rgba(10, 24, 16, 0) 55%),
          radial-gradient(ellipse at 75% 60%, rgba(20, 50, 100, 0.4) 0%, rgba(8, 14, 28, 0) 50%),
          radial-gradient(ellipse at 50% 85%, rgba(80, 50, 20, 0.35) 0%, rgba(10, 14, 18, 0) 60%),
          radial-gradient(ellipse at center, rgba(10, 22, 18, 0) 0%, rgba(0, 0, 0, 0.85) 100%),
          linear-gradient(180deg, #0c1612 0%, #08100d 50%, #0a0e08 100%);
      }
      body::before {
        /* faint noise / hex texture suggesting the rift */
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          repeating-linear-gradient(60deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 6px),
          repeating-linear-gradient(-60deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 6px);
        pointer-events: none;
        z-index: 0;
      }
      body::after {
        /* heavy vignette */
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at center, rgba(0,0,0,0) 30%, rgba(0,0,0,0.65) 100%);
        pointer-events: none;
        z-index: 0;
      }
      body.bg-off, body.bg-off::before, body.bg-off::after {
        background: transparent !important;
      }

      #stage {
        position: relative;
        width: 100vw;
        height: 100vh;
        z-index: 1;
      }

      @keyframes rspin { to { transform: rotate(360deg); } }
    </style>
    <script>
      // OBS mode: transparent everything, hide dev panel + debug
      if (new URLSearchParams(location.search).get("obs") === "1") {
        document.documentElement.classList.add("obs");
        window.addEventListener("DOMContentLoaded", () => document.body.classList.add("bg-off"));
      }
      // Filter framer-motion's spurious child-key warning (non-fatal)
      (function () {
        const orig = console.error;
        console.error = function (...args) {
          if (typeof args[0] === "string" && args[0].includes("unique \"key\" prop")) return;
          return orig.apply(console, args);
        };
      })();
    </script>
  </head>
  <body>
    <template id="__bundler_thumbnail" data-bg-color="#0c1612">
      <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
        <rect width="1200" height="800" fill="#0c1612"/>
        <g transform="translate(600 400)">
          <circle r="220" fill="none" stroke="#F6E232" stroke-width="6"/>
          <circle r="60" fill="#0E0E10" stroke="#2A2A30" stroke-width="2"/>
          <circle r="32" fill="#F6E232"/>
          <text x="0" y="11" text-anchor="middle" font-family="Georgia, serif" font-weight="900" font-size="40" fill="#0a0a0c">S</text>
          <path d="M 0 -240 L -16 -220 L 16 -220 Z" fill="#F6E232"/>
          <g stroke="#F6E232" stroke-width="2" opacity="0.4">
            <line x1="0" y1="-220" x2="0" y2="220"/>
            <line x1="-220" y1="0" x2="220" y2="0"/>
            <line x1="-155" y1="-155" x2="155" y2="155"/>
            <line x1="-155" y1="155" x2="155" y2="-155"/>
          </g>
        </g>
        <text x="600" y="700" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="36" fill="#F6E232" letter-spacing="8">SOLOQCHALLENGE</text>
      </svg>
    </template>
    <div id="stage">
      <div id="root"></div>
    </div>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
    <script type="text/babel" src="overlay-v3-standalone.jsx"></script>
  </body>
</html>
